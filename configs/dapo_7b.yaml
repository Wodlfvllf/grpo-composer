# ──────────────────────────────────────────────────────
# DAPO — Decoupled Clip and Dynamic Sampling Policy Optimization
# Paper: https://arxiv.org/abs/2503.14476
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Asymmetric clipping: ε_low=0.2, ε_high=0.28 (allows more exploration)
#   2. Global token aggregation: 1/Σ|o_i| (each token weighted equally)
#   3. No KL penalty (β = 0)
#   4. Overlong filtering with max_len (handled by veRL rollout config)

algorithm:
  adv_estimator: "grpo"

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2                  # Base (used as fallback)
    # ── Composer config ──
    clip_mode: "asymmetric"          # clip(ρ, 1-ε_l, 1+ε_h)
    clip_ratio_low: 0.2             # ε_low = 0.2
    clip_ratio_high: 0.28           # ε_high = 0.28 (asymmetric, more exploration)
    agg_mode: "global_token"         # (1/Σ|o_i|) Σ_i Σ_t — each token equal
    regularizer: "none"             # No KL penalty
    reg_coef: 0.0
