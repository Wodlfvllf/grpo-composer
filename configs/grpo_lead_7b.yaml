# ──────────────────────────────────────────────────────
# GRPO-LEAD — Difficulty-Aware RL for Math Reasoning
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# 3 key innovations over base GRPO:
#   1. Length-dependent accuracy reward: exp(-α*z) for correct, -1 for wrong
#      → core/rewards/length_dependent.py → LengthDependentRewardCalculator
#   2. Explicit -1 penalty for incorrect (built into reward above)
#   3. Difficulty-aware asymmetric advantage reweighting:
#      → core/advantages/difficulty_aware.py → DifficultyAwareAdvantageFunction
#      A'_i = Ã_i * w(ρ_q)     if Ã_i > 0  (boost correct on hard problems)
#           = Ã_i * w(1-ρ_q)   if Ã_i ≤ 0  (penalize wrong on easy problems)
#
# Paper removes KL penalty (found to suppress exploration)

algorithm:
  adv_estimator: "difficulty_aware_grpo"

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2
    # ── Composer config ──
    clip_mode: "symmetric"
    agg_mode: "token_mean"
    regularizer: "none"                # Paper removes KL penalty
    reg_coef: 0.0
    # ── GRPO-LEAD difficulty params (paper defaults) ──
    difficulty_A: 0.4                  # Lower bound of logistic weight
    difficulty_B: 1.5                  # Upper bound of logistic weight
    difficulty_k: 10.0                 # Steepness of logistic
    difficulty_rho_0: 0.75             # Inflection point (75% correctness)
