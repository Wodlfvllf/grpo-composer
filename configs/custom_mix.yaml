# ──────────────────────────────────────────────────────
# Custom Mix — Novel combination that no single paper proposes
# ──────────────────────────────────────────────────────
# This demonstrates the composability of grpo_composer:
#
#   Advantage:   Kalman filter baseline (KRPO)     — adaptive baseline tracking
#   Clipping:    Asymmetric (DAPO)                 — allows more exploration
#   Aggregation: Global token (DAPO)               — equal weight per token
#   Regularizer: Weighted KL (TR-GRPO)             — confidence-aware constraint
#
# Rationale:
#   Kalman advantage + asymmetric clip = adaptive baseline that allows more
#   exploration. Global token normalization avoids length bias. Weighted KL
#   keeps constraint tight on confident tokens, loose on uncertain ones.
#
# This combination is ONLY possible with grpo_composer's composable system.
# No single framework supports mixing components from 3 different papers.

algorithm:
  adv_estimator: "kalman_grpo"          # Kalman filter baseline (KRPO paper)

actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: "composer"

composer:
  clip_mode: "asymmetric"             # From DAPO — allows more exploration
  clip_ratio: 0.2
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  agg_mode: "global_token"            # From DAPO — each token weighted equally
  regularizer: "weighted_kl"          # From TR-GRPO — confidence-weighted KL
  reg_coef: 0.005                     # Lighter regularization (experimental)
  # ── Kalman parameters ──
  kalman_Q: 1e-4                      # Process noise (baseline volatility)
  kalman_R: 1.0                       # Measurement noise (reward noise)
  # ── TR-GRPO parameters (for weighted KL) ──
  tr_alpha: 1.0
  tr_tau: 1.0
  tr_mu: 0.5
