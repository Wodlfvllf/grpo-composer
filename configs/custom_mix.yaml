# ============================================================
# Custom Mix Cookbook (single-file reference template)
# ============================================================
#
# Use this file as a switchboard: pick one option per section.
#
# 1) algorithm.adv_estimator (pick ONE)
#    veRL built-ins: grpo, gae
#    composer custom:
#      rank_enhanced_grpo
#      difficulty_aware_grpo
#      length_corrected_grpo
#      kalman_grpo
#      decoupled_grpo
#      multi_scale_grpo
#      static_value_grpo
#      novelty_sharp_grpo
#      stratified_grpo
#      unbiased_grpo
#
# 2) algorithm.composer_flow (optional runtime flow)
#    default | pvpo | pvpo_grpo | gapo | gapo_grpo | info_grpo
#
# 3) composer.clip_mode (pick ONE)
#    symmetric | asymmetric | trajectory | weighted_trust
#
# 4) composer.agg_mode (pick ONE)
#    token_mean | token_sum | global_token | group_uniform
#    trajectory_level | weighted_token | group_learnable | difficulty_weighted
#
# 5) composer.regularizer (pick ONE)
#    none | kl | weighted_kl | preference | mutual_info | log_weight
#
# 6) composer.composer_reward_pipeline (optional list, in order)
#    unlikeliness | rank | rts | posterior | multi_reward
#    length_dependent | diversity_adjusted | frequency_aware
#
# ------------------------------------------------------------
# Notes for modes that need extra signals/config
# ------------------------------------------------------------
# - decoupled_grpo adv_estimator needs multi-reward inputs.
# - static_value_grpo adv_estimator needs reference rewards.
# - stratified_grpo adv_estimator needs strata ids.
# - novelty_sharp_grpo can use old_log_probs for novelty shaping.
# - weighted_trust / weighted_token / weighted_kl use tr_* params.
# - group_learnable uses lambda_* params; lambda_learnable=true trains lambda.
# - difficulty_weighted needs DARO row context (patched worker path).
# - info_grpo flow + mutual_info regularizer require augmented rollout pairing.
#
# ------------------------------------------------------------
# Runnable default (edit this block)
# ------------------------------------------------------------
algorithm:
  adv_estimator: "grpo"
  # composer_flow: "default"
  # composer_flow_plugins: ["default"]

actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: "composer"
  rollout:
    n: 4  # keep >1 for most group-relative methods

composer:
  # Core selector knobs
  clip_mode: "symmetric"
  agg_mode: "token_mean"
  regularizer: "kl"
  reg_coef: 0.01

  # Base clipping knobs
  clip_ratio: 0.2
  # clip_ratio_low: 0.2
  # clip_ratio_high: 0.28

  # Optional reward transforms
  # composer_reward_pipeline:
  #   - rank
  #   - unlikeliness

  # --- weighted_trust / weighted_token / weighted_kl ---
  # tr_alpha: 2.0
  # tr_tau: 9.0
  # tr_mu: 0.25
  # tr_l: 1.0
  # tr_u: 1.4

  # --- lambda-GRPO (agg_mode=group_learnable) ---
  # lambda_learnable: true
  # lambda_init: 0.0
  # lambda_r: 0.1111
  # lambda_lr: 0.1

  # --- difficulty_weighted aggregation ---
  # difficulty_bins: 10
  # difficulty_weight_c: 1.0
  # difficulty_weight_learnable: true
  # difficulty_weight_init: 1.0

  # --- rank-based settings ---
  # ranking_type: heuristic   # heuristic | rrm
  # ranking_method: weight    # weight | supplement | reward
  # ranking_tau: 0.1
  # rank_xi_minus: -0.5
  # rank_xi_plus: 0.5

  # --- unlikeliness transform ---
  # unlikeliness_beta: 0.5

  # --- KRPO / multi-scale / stratified / novelty adv params ---
  # kalman_Q: 1e-4
  # kalman_R: 1.0
  # ms_tau_min: 2
  # ms_num_scales: 4
  # ms_samples_per_scale: 4
  # ms_weights: null
  # stratified_alpha: 1.0
  # novelty_lambda: 1.0
  # novelty_kappa: 1.0
