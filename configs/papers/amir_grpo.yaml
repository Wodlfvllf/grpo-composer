# ──────────────────────────────────────────────────────
# AMIR-GRPO — Augmented Mutual Information Regularized GRPO
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Adds DPO-style preference regularizer from intra-group reward rankings
#   2. Constructs implicit preference pairs: S(q) = {(i,j) | r_i > r_j, r_i - r_j > δ_r}
#   3. DPO logit: z_{i,j} = β_DPO * [(ℓ_θ(o_i) - ℓ_ref(o_i)) - (ℓ_θ(o_j) - ℓ_ref(o_j))]
#   4. J_AMIR-GRPO = J_GRPO + λ_reg * J_pref
#
# Components:
#   Advantage:     Standard GRPO (base)
#   Clipping:      Symmetric (base)
#   Aggregation:   Token mean (base)
#   Regularizer:   Preference (AMIR-GRPO specific!)
#   KL:            Standard KL (separate γ term in base GRPO objective)

algorithm:
  adv_estimator: grpo
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
  rollout:
    n: 8
composer:
  clip_ratio: 0.2
  clip_mode: symmetric
  agg_mode: token_mean
  regularizer: preference
  reg_coef: 0.1
  beta_dpo: 0.1
  delta_reward: 0.0
