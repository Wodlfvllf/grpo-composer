# ──────────────────────────────────────────────────────
# λ-GRPO — Learnable Token Preferences
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Replaces uniform 1/G weighting with learnable f_λ(o_i)
#   2. f_λ(o_i) = G × softmax(h_i^λ) where h_i = 1 + r·z_i
#   3. λ ∈ ℝ is a LEARNABLE parameter (SGD, lr=0.1)
#   4. Unifies GRPO (f=μ/|o|), DAPO (f=1), Dr.GRPO (f=μ) as special cases
#
# Components:
#   Advantage:     Standard GRPO (base)
#   Clipping:      Symmetric (base GRPO)
#   Aggregation:   GroupLearnableAggregation (λ-GRPO specific!)
#   KL:            Optional (paper doesn't specify)
#
# Note: λ is a nn.Parameter in GroupLearnableAggregation.
#   The worker update path must register it into optimizer param groups
#   with lambda_lr so it receives gradients each actor step.

algorithm:
  adv_estimator: grpo
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
  rollout:
    n: 4
composer:
  clip_ratio: 0.2
  clip_mode: symmetric
  agg_mode: group_learnable
  regularizer: kl
  reg_coef: 0.01
  lambda_learnable: true
  lambda_init: 0.0
  lambda_r: 0.1111
  lambda_lr: 0.1
