# ──────────────────────────────────────────────────────
# DAPO — Decoupled Clip and Dynamic Sampling Policy Optimization
# Paper: https://arxiv.org/abs/2503.14476
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Asymmetric clipping: ε_low=0.2, ε_high=0.28 (allows more exploration)
#   2. Global token aggregation: 1/Σ|o_i| (each token weighted equally)
#   3. No KL penalty (β = 0)
#   4. Overlong filtering with max_len (handled by veRL rollout config)

algorithm:
  adv_estimator: grpo
  filter_groups:
    enable: true
    metric: seq_reward
    max_num_gen_batches: 8
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
  rollout:
    n: 4

composer:
  clip_ratio: 0.2
  clip_mode: asymmetric
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  agg_mode: global_token
  regularizer: none
  reg_coef: 0.0

trainer:
  balance_batch: false
