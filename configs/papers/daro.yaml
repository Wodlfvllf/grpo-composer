# ──────────────────────────────────────────────────────
# DARO — Difficulty-Aware Reward Optimization
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Base GRPO advantage (no custom advantage reweighting)
#   2. Difficulty-weighted aggregation over μ_q bins
#   3. No explicit KL regularizer
#   4. Symmetric clipping (standard)

algorithm:
  adv_estimator: grpo
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer

  rollout:
    n: 8
composer:
  clip_ratio: 0.2
  clip_mode: symmetric
  agg_mode: difficulty_weighted
  regularizer: none
  reg_coef: 0.0
  difficulty_bins: 10
  difficulty_weight_c: 1.0
