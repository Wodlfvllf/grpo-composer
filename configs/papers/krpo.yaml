# ──────────────────────────────────────────────────────
# KRPO — Kalman Filter Enhanced GRPO
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Advantage baseline: Kalman filter state estimate x̂ (replaces group mean)
#   2. Advantage normalization: √P (posterior uncertainty, replaces group std)
#   3. Formula: A_i = (r_i - x̂_{i|i}) / (√P_{i|i} + ε)
#
# The Kalman filter adaptively tracks the reward baseline across steps,
# giving recent rewards more influence via the Kalman gain K.
#
# Connection to GRPO:
#   Standard GRPO is a special case with Q→0 (constant baseline).
#   KRPO generalizes by allowing Q>0 for dynamic baseline tracking.
#
# Components:
#   Advantage:     KalmanAdvantageFunction (KRPO-specific)
#   Clipping:      Symmetric (base GRPO)
#   Aggregation:   Token mean (base GRPO)
#   KL:            Standard KL with β=0.01

algorithm:
  adv_estimator: kalman_grpo
  kalman_Q: 1e-5
  kalman_R: 1e-2
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
composer:
  clip_ratio: 0.2
  clip_mode: symmetric
  agg_mode: token_mean
  regularizer: kl
  reg_coef: 0.01
