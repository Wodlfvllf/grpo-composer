# ──────────────────────────────────────────────────────
# Rewarding the Unlikely — Lifting GRPO Beyond Distribution Sharpening
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. REWARD: Unlikeliness reward — rank-based penalty on correct solutions
#      r_i = R(x,y) × (1 - β_rank × (G - rank(y_i)) / G)
#      → core/rewards/unlikeliness.py
#
# Problem solved:
#   Standard GRPO sharpens the distribution around already-likely solutions,
#   improving pass@1 but DEGRADING pass@N for large N.
#   The unlikeliness reward creates higher advantages for rare correct proofs,
#   improving coverage/diversity.
#
# Components:
#   Reward:        UnlikelinessRewardCalculator (paper-specific!)
#   Advantage:     Standard GRPO (base)
#   Clipping:      Symmetric (base GRPO)
#   Aggregation:   Token mean (base GRPO)
#   KL:            Standard KL (base GRPO)

algorithm:
  adv_estimator: grpo
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
composer:
  clip_ratio: 0.2
  clip_mode: symmetric
  agg_mode: token_mean
  regularizer: kl
  reg_coef: 0.01
  unlikeliness_beta: 0.5
  composer_reward_pipeline:
  - unlikeliness
