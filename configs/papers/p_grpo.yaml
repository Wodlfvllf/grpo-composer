# ──────────────────────────────────────────────────────
# P-GRPO — Posterior GRPO (Posterior Composite Rewards)
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Composite reward from 3 sources: format + outcome + thinking
#      R = w_f * r_format + w_o * r_outcome + w_t * r_thinking
#   2. Posterior weighting adjusts reward contribution dynamically
#
# Components:
#   Advantage:     Standard GRPO (base)
#   Clipping:      Symmetric (base)
#   Aggregation:   Token mean (base)
#   Regularizer:   KL (base)
#   Reward:        PosteriorCompositeRewardCalculator (P-GRPO specific!)

algorithm:
  adv_estimator: grpo
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
composer:
  clip_ratio: 0.2
  clip_mode: symmetric
  agg_mode: token_mean
  regularizer: kl
  reg_coef: 0.01
  composer_reward_pipeline:
  - posterior
