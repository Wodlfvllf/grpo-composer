# ──────────────────────────────────────────────────────
# Rank-GRPO — Intra-Group Preference Ranking
# Paper: "RankGRPO: Ranking Reward Model"
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. REWARD: Combines binary correctness with intra-group ranking
#      Three modes (set via ranking_method):
#        "weight":     s_rank = exp(τ·(1-r)) · s_rule
#        "supplement": s_rank = s_rule + τ · tanh(G/r - 1)
#        "reward":     s_rank = (G - r) / (G - 1)
#   2. Advantage clipping by correctness:
#        If correct:   A_clip = max(A, ξ⁻)
#        If incorrect: A_clip = min(A, ξ⁺)
#
# Components:
#   Reward:        RankEnhancedRewardCalculator (Rank-GRPO specific!)
#   Advantage:     Standard GRPO (base)
#   Clipping:      Symmetric (base GRPO)
#   Aggregation:   Token mean (base GRPO)
#   KL:            Standard KL (base GRPO)

algorithm:
  adv_estimator: "grpo"
  composer_reward_pipeline: ["rank"]

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2
    # ── Composer config (all standard base GRPO) ──
    clip_mode: "symmetric"
    agg_mode: "token_mean"
    regularizer: "kl"
    reg_coef: 0.01
    # ── Rank-GRPO reward params ──
    ranking_method: "weight"            # "weight", "supplement", or "reward"
    ranking_tau: 0.1                    # Temperature for rank scaling
