# ──────────────────────────────────────────────────────
# PVPO — Pre-estimated Value-based Policy Optimization
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Advantage: Static V baseline from reference policy pre-rollouts
#      Â^PVPO = r_i - mean(r_ref)  (unnormalized — no std division!)
#      Q: dynamic from on-policy π_θ
#      V: static from reference π_ref
#   2. Modified importance ratio for GT trajectories:
#      Uses π_{gt} instead of π_{old} when o_i is a ground truth trajectory
#      (training-loop level change, not in loss function)
#   3. Group sampling: filters trivial (acc=1) and impossible (acc=0) samples
#      For acc=0, inject GT trajectory from larger LLM
#
# Components:
#   Advantage:     StaticValueAdvantageFunction (PVPO specific!)
#   Clipping:      Symmetric (base GRPO)
#   Aggregation:   Token mean (base GRPO)
#   KL:            Standard KL with β

algorithm:
  adv_estimator: "static_value_grpo"    # PVPO static V advantage (from grpo_composer)
  composer_flow: "pvpo"

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2
    # ── Composer config ──
    clip_mode: "symmetric"
    agg_mode: "token_mean"
    regularizer: "kl"
    reg_coef: 0.01                      # β for KL divergence
