# ──────────────────────────────────────────────────────
# TR-GRPO — Trust Region GRPO
# Paper: https://arxiv.org/abs/2503.12345
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Weighted trust region clipping: per-token dynamic bounds
#   2. Weighted token aggregation: down-weights confident tokens
#   3. Weighted KL divergence regularizer
#   4. All weights derived from token probability confidence

algorithm:
  adv_estimator: grpo
actor_rollout_ref:
  actor:
    policy_loss:
      loss_mode: composer
  rollout:
    n: 4   # or 8

composer:
  clip_ratio: 0.2
  clip_ratio_low: 0.2
  clip_ratio_high: 0.2
  clip_mode: weighted_trust
  agg_mode: weighted_token
  regularizer: weighted_kl
  reg_coef: 0.01
  tr_alpha: 2.0
  tr_tau: 9.0
  tr_mu: 0.25
  tr_l: 1.0
  tr_u: 1.4
