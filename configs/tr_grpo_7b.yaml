# ──────────────────────────────────────────────────────
# TR-GRPO — Trust Region GRPO
# Paper: https://arxiv.org/abs/2503.12345
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Weighted trust region clipping: per-token dynamic bounds
#   2. Weighted token aggregation: down-weights confident tokens
#   3. Weighted KL divergence regularizer
#   4. All weights derived from token probability confidence

algorithm:
  adv_estimator: "grpo"

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2                  # Base ε for weighted trust bounds
    # ── Composer config ──
    clip_mode: "weighted_trust"      # Per-token confidence-weighted dynamic bounds
    agg_mode: "weighted_token"       # Probability-weighted token aggregation
    regularizer: "weighted_kl"      # Confidence-weighted KL
    reg_coef: 0.01
    # ── TR-GRPO parameters ──
    tr_alpha: 1.0                    # Scaling factor for confidence weight
    tr_tau: 1.0                      # Temperature for sigmoid
    tr_mu: 0.5                       # Centering constant
