# ──────────────────────────────────────────────────────
# Dr.GRPO — Don't Let Your Gradient Dilute
# Paper: https://arxiv.org/abs/2503.20783
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Token sum aggregation: Σ_t (no 1/|o_i| length normalization)
#   2. No KL penalty (β = 0)
#   3. No std normalization in advantage (handled by veRL config)
#   4. Keeps symmetric clipping

algorithm:
  adv_estimator: "grpo"
  norm_adv_by_std_in_grpo: false     # Dr.GRPO disables std normalization

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2
    # ── Composer config ──
    clip_mode: "symmetric"           # Standard PPO clip
    agg_mode: "token_sum"            # (1/G) Σ_i Σ_t — no length normalization
    regularizer: "none"             # No KL penalty
    reg_coef: 0.0
