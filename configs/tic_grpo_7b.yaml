# ──────────────────────────────────────────────────────
# TIC-GRPO — Trajectory-level Importance Correction GRPO
# Paper: https://arxiv.org/abs/2503.xxxxx
# ──────────────────────────────────────────────────────
# Key changes from base GRPO:
#   1. Length-corrected advantage: removes length bias from rewards
#   2. Trajectory-level clipping: clips at sequence level, not token level
#   3. Upper-only clip: only caps ratio growth (no lower bound penalty)
#   4. Standard KL regularizer

algorithm:
  adv_estimator: "length_corrected_grpo"   # TIC-GRPO advantage (from grpo_composer)

actor_rollout_ref:
  actor:
    loss_fn: "composer"
    clip_ratio: 0.2
    # ── Composer config ──
    clip_mode: "trajectory"           # Trajectory-level ratio + upper-only clip
    clip_ratio_high: 1.28            # Upper clip bound for trajectory ratio
    agg_mode: "token_mean"            # Standard token mean
    regularizer: "kl"
    reg_coef: 0.01
